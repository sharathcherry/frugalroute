<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FrugalRoute · Try it</title>
<style>
  :root{
    --bg:#0a0d14; --panel:rgba(21,27,39,.62); --line:rgba(255,255,255,.09);
    --txt:#e8eef8; --muted:#8b97ab;
    --amd:#ED1C24; --amd2:#ff5b60;
    --tools:#f59e0b; --local:#34d399; --remote:#fb7185; --cache:#60a5fa;
  }
  *{box-sizing:border-box} html,body{margin:0;min-height:100%}
  body{
    background:
      radial-gradient(1100px 560px at 8% -10%, rgba(237,28,36,.16), transparent 60%),
      radial-gradient(900px 600px at 108% 0%, rgba(96,165,250,.12), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(52,211,153,.10), transparent 55%),
      #0a0d14;
    color:var(--txt); font-family:Inter,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:900px;margin:0 auto;padding:34px 20px 70px}
  .glass{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:blur(16px);box-shadow:0 12px 44px rgba(0,0,0,.4)}
  .muted{color:var(--muted)}
  textarea{font-family:inherit}
  ::selection{background:rgba(237,28,36,.35)}
  .recharts-default-tooltip{background:#0d1220!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{ "imports": {
  "react":"https://esm.sh/react@18.2.0",
  "react-dom/client":"https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
  "framer-motion":"https://esm.sh/framer-motion@11.0.8?deps=react@18.2.0,react-dom@18.2.0",
  "htm":"https://esm.sh/htm@3.1.1"
}}
</script>
<script type="module">
import React,{useState,useEffect,useRef} from "react";
import {createRoot} from "react-dom/client";
import {motion,AnimatePresence,animate} from "framer-motion";
import htm from "htm";
const html=htm.bind(React.createElement);

const TIERS=[
  {key:"cache", label:"Cache",  cost:"0 tok", color:"var(--cache)"},
  {key:"tools", label:"Tools",  cost:"0 tok", color:"var(--tools)"},
  {key:"local", label:"Local",  cost:"0 tok", color:"var(--local)"},
  {key:"remote",label:"Remote", cost:"paid",  color:"var(--remote)"},
];
const srcToTier=(s)=> s==="cache"?"cache" : s==="remote"?"remote"
  : (s==="tools"?"tools":"local");
const EXAMPLES=[
  "Calculate 145 + 278",
  "Classify sentiment: 'I absolutely love this!'",
  "Extract emails from: a@x.com or b@y.org",
  "What is the capital of France?",
  "Explain step by step why the sky is blue",
];

function CountUp({value,dur=.8,suffix=""}){
  const [v,setV]=useState(0);
  useEffect(()=>{const c=animate(0,value||0,{duration:dur,ease:[.16,1,.3,1],onUpdate:x=>setV(x)});return()=>c.stop();},[value]);
  const dec=String(value).includes(".");
  return html`<span>${dec?(Math.round(v*10)/10):Math.round(v)}${suffix}</span>`;
}

function StatusPills({h}){
  if(!h) return null;
  const live = !h.mock;
  return html`<div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
    <span class="pill" style=${chip(live?"var(--local)":"var(--tools)")}>${live?"● LIVE":"● MOCK"}</span>
    <span class="pill" style=${chip("var(--muted)")}>engine: ${h.engine}</span>
    <span class="pill" style=${chip("var(--cache)")}>local: ${short(h.local_model)}</span>
    <span class="pill" style=${chip("var(--remote)")}>remote: ${short(h.remote_model)}</span>
  </div>`;
}
const short=(m)=> (m||"").split("/").pop();
const chip=(c)=>({fontSize:11,fontWeight:600,color:c,background:"rgba(255,255,255,.05)",
  border:"1px solid var(--line)",borderRadius:20,padding:"3px 10px"});

function TierLadder({active}){
  return html`<div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,margin:"4px 0 2px"}}>
    ${TIERS.map((t,i)=>{
      const on = t.key===active;
      return html`<${motion.div} key=${t.key}
        animate=${{scale:on?1.04:1, opacity:on?1:.45}}
        transition=${{type:"spring",stiffness:260,damping:20}}
        style=${{textAlign:"center",padding:"12px 6px",borderRadius:14,
          border:`1px solid ${on?t.color:"var(--line)"}`,
          background:on?`${t.color}1f`:"rgba(255,255,255,.02)"}}>
        <div style=${{fontSize:13,fontWeight:700,color:on?t.color:"var(--muted)"}}>${t.label}</div>
        <div class="muted" style=${{fontSize:11,marginTop:2}}>${t.cost}</div>
      <//>`;
    })}
  </div>`;
}

function Result({r}){
  if(!r) return null;
  const free = (r.remote_tokens||0)===0;
  return html`<${motion.div} initial=${{opacity:0,y:12}} animate=${{opacity:1,y:0}}
      transition=${{type:"spring",stiffness:220,damping:22}} class="glass" style=${{padding:18,marginTop:14}}>
    <${TierLadder} active=${srcToTier(r.source)} />
    <div style=${{display:"flex",gap:10,flexWrap:"wrap",margin:"12px 0 10px"}}>
      <${Badge} c="var(--cache)" k="source" v=${r.source} />
      <${Badge} c="var(--muted)" k="category" v=${r.category} />
      <${Badge} c="var(--tools)" k="conf" v=${r.confidence==null?"—":r.confidence} />
      <${Badge} c="var(--muted)" k="latency" v=${r.latency_ms+" ms"} />
    </div>
    <div style=${{fontSize:12,color:"var(--muted)",marginBottom:6}}>Answer</div>
    <div style=${{whiteSpace:"pre-wrap",fontSize:15,lineHeight:1.5,
      background:"rgba(255,255,255,.03)",border:"1px solid var(--line)",borderRadius:12,padding:"12px 14px"}}>
      ${r.answer||"—"}</div>
    <div style=${{display:"flex",alignItems:"center",gap:14,marginTop:14,flexWrap:"wrap"}}>
      <div style=${{fontSize:30,fontWeight:800,color:free?"var(--local)":"var(--remote)"}}>
        <${CountUp} value=${r.remote_tokens} /> <span style=${{fontSize:14,fontWeight:600}}>${free?"tokens · FREE":"paid tokens"}</span>
      </div>
      ${r.tokens_saved>0 && html`<span class="muted" style=${{fontSize:12}}>~${r.tokens_saved} saved by compression</span>`}
    </div>
  <//>`;
}
function Badge({c,k,v}){
  return html`<span style=${{fontSize:12,color:"var(--txt)",background:"rgba(255,255,255,.04)",
    border:"1px solid var(--line)",borderRadius:10,padding:"4px 10px"}}>
    <span class="muted">${k}:</span> <b style=${{color:c}}>${String(v)}</b></span>`;
}

function App(){
  const [q,setQ]=useState("");
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [sess,setSess]=useState(null);
  const [health,setHealth]=useState(null);
  const [err,setErr]=useState(null);
  useEffect(()=>{fetch("/api/health").then(r=>r.json()).then(setHealth).catch(()=>{});},[]);

  async function run(text){
    const task=(text!=null?text:q).trim(); if(!task||busy) return;
    setBusy(true); setErr(null);
    try{
      const r=await fetch("/api/route",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({task})});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const d=await r.json(); setRes(d); setSess(d.session);
    }catch(e){ setErr(String(e.message||e)); }
    setBusy(false);
  }

  return html`
    <${motion.div} initial=${{opacity:0,y:-8}} animate=${{opacity:1,y:0}} transition=${{duration:.5}}>
      <div style=${{display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap"}}>
        <div style=${{fontSize:30,fontWeight:800,letterSpacing:"-.03em",
          background:"linear-gradient(90deg,#e8eef8,var(--amd))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FrugalRoute</div>
        <div class="muted" style=${{fontSize:13}}>local-first LLM router · AMD Instinct MI300X</div>
      </div>
      <div style=${{margin:"10px 0 18px"}}><${StatusPills} h=${health} /></div>
    <//>

    <div class="glass" style=${{padding:18}}>
      <div style=${{fontSize:13,fontWeight:600,marginBottom:8}}>Ask anything — watch it route</div>
      <textarea value=${q} onInput=${e=>setQ(e.target.value)}
        onKeyDown=${e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")run();}}
        placeholder="e.g. Calculate 145 + 278   (Ctrl/⌘+Enter to run)"
        rows=${3} style=${{width:"100%",resize:"vertical",background:"rgba(255,255,255,.03)",
          color:"var(--txt)",border:"1px solid var(--line)",borderRadius:12,padding:"12px 14px",fontSize:15,outline:"none"}} />
      <div style=${{display:"flex",gap:8,flexWrap:"wrap",margin:"10px 0"}}>
        ${EXAMPLES.map((ex,i)=>html`<button key=${i} onClick=${()=>{setQ(ex);run(ex);}}
          style=${{fontSize:12,color:"var(--muted)",background:"rgba(255,255,255,.04)",
            border:"1px solid var(--line)",borderRadius:20,padding:"5px 11px",cursor:"pointer"}}>${ex}</button>`)}
      </div>
      <${motion.button} whileTap=${{scale:.97}} onClick=${()=>run()} disabled=${busy||!q.trim()}
        style=${{width:"100%",padding:"12px 16px",borderRadius:12,border:"none",cursor:busy?"default":"pointer",
          fontSize:15,fontWeight:700,color:"#fff",opacity:(busy||!q.trim())?.6:1,
          background:"linear-gradient(90deg,var(--amd),var(--amd2))"}}>
        ${busy?"Routing…":"Route it →"}
      <//>
      ${err && html`<div style=${{color:"var(--remote)",fontSize:13,marginTop:10}}>Error: ${err} — is the server running? (uvicorn server:app)</div>`}
    </div>

    <${AnimatePresence}>${res && html`<${Result} key="r" r=${res} />`}<//>

    ${sess && html`<${motion.div} initial=${{opacity:0}} animate=${{opacity:1}}
      class="glass" style=${{padding:14,marginTop:14,display:"flex",gap:22,flexWrap:"wrap",justifyContent:"space-around"}}>
      <${Stat} label="queries" value=${sess.queries} c="var(--txt)" />
      <${Stat} label="handled free" value=${sess.free_pct} suffix="%" c="var(--local)" />
      <${Stat} label="total paid tokens" value=${sess.remote_tokens} c="var(--remote)" />
    <//>`}

    <div class="muted" style=${{textAlign:"center",fontSize:11,marginTop:22}}>
      Tools → Local (MI300X, free) → Remote (Fireworks, paid). Every free answer is verified before it's trusted.
    </div>
  `;
}
function Stat({label,value,suffix,c}){
  return html`<div style=${{textAlign:"center"}}>
    <div style=${{fontSize:24,fontWeight:800,color:c}}><${CountUp} value=${value} suffix=${suffix||""} /></div>
    <div class="muted" style=${{fontSize:11}}>${label}</div>
  </div>`;
}
createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
